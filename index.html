<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE NEON PANEL | RIZAM STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        body {
            background: radial-gradient(circle at center, #05051a 0%, #000 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Kosmik Bergerak */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: moveStars 120s linear infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .neon-box {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .tab-btn.active {
            background: rgba(0, 255, 255, 0.2);
            border-bottom: 2px solid #00ffff;
            color: #00ffff;
        }

        .hidden { display: none; }

        /* Karakter Floating Animation */
        .character-img {
            filter: drop-shadow(0 0 20px #00ffff);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Neon Text Glow */
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
    </style>
</head>
<body class="p-2 md:p-6 h-screen flex flex-col">

    <div class="stars"></div>

    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="neon-box p-8 rounded-3xl text-center max-w-sm w-full border-t-4 border-cyan-500">
            <h1 class="text-3xl font-black text-cyan-400 mb-2 italic tracking-widest glow-text">DRAGON V3</h1>
            <p class="text-[10px] text-gray-500 mb-6 uppercase tracking-[0.3em]">Identity Verification Required</p>
            
            <input type="password" id="pass" class="w-full p-4 bg-black border border-cyan-900 rounded-xl mb-4 text-center outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all text-cyan-400 font-mono" placeholder="PASTE KEY HERE">
            
            <div class="flex flex-col gap-3">
                <button onclick="checkLogin()" class="w-full bg-cyan-600 py-4 rounded-xl font-black hover:bg-cyan-400 transition-all text-black uppercase tracking-widest shadow-lg shadow-cyan-900/50">
                    <i class="fas fa-bolt mr-2"></i> Start Engine
                </button>
                
                <a href="https://wa.me/6285608906983?text=Tolong%20Berikan%20Saya%20Key%20Injector%20Panel" target="_blank" class="w-full bg-transparent border border-cyan-600 py-3 rounded-xl font-bold hover:bg-cyan-900/30 transition-all text-cyan-400 uppercase text-xs flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> Get License Key
                </a>
            </div>

            <p class="mt-8 text-[9px] text-gray-600 italic">Protected by Rizam Studio Security</p>
        </div>
    </div>

    <div id="main-panel" class="hidden flex-1 flex flex-col overflow-hidden">
        
        <div class="flex flex-wrap justify-between items-center mb-4 gap-4 p-4 neon-box rounded-2xl">
            <div>
                <h1 class="text-xl font-black text-cyan-400 tracking-tighter">RIZAM STUDIO <span class="text-white text-xs font-light">| GLOBAL PANEL</span></h1>
            </div>
            <div class="flex gap-4">
                <input type="number" id="uid" class="bg-black/50 border border-cyan-900 px-4 py-1 rounded-lg text-xs outline-none focus:border-cyan-400" placeholder="Player ID...">
                <button onclick="logAction('Target Locked!')" class="text-xs bg-cyan-900 px-3 py-1 rounded border border-cyan-400 text-cyan-400 hover:bg-cyan-600 transition">Lock ID</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col md:flex-row gap-4 overflow-hidden">
            
            <aside class="w-full md:w-56 flex md:flex-col gap-2 overflow-x-auto md:overflow-y-auto pb-2 md:pb-0">
                <button onclick="openTab('aim')" class="tab-btn active w-full p-4 rounded-xl text-left text-[10px] font-bold transition-all"><i class="fas fa-crosshairs mr-2"></i> COMBAT CORE</button>
                <button onclick="openTab('ghost')" class="tab-btn w-full p-4 rounded-xl text-left text-[10px] font-bold transition-all"><i class="fas fa-ghost mr-2"></i> GHOST MODS</button>
                <button onclick="openTab('visual')" class="tab-btn w-full p-4 rounded-xl text-left text-[10px] font-bold transition-all"><i class="fas fa-eye mr-2"></i> VISUAL ESP</button>
                <button onclick="openTab('weapon')" class="tab-btn w-full p-4 rounded-xl text-left text-[10px] font-bold transition-all"><i class="fas fa-bomb mr-2"></i> WEAPONRY</button>
            </aside>

            <section class="flex-1 neon-box rounded-3xl p-6 overflow-y-auto">
                
                <div id="tab-aim" class="tab-content">
                    <h2 class="text-cyan-400 text-sm font-black mb-6 uppercase border-b border-cyan-900 pb-2 italic">Combat Module</h2>
                    <div class="space-y-6">
                        <div class="space-y-4">
                            <label class="flex justify-between items-center text-xs tracking-wider">AUTO HEADSHOT <input type="checkbox" class="w-5 h-5 accent-cyan-400"></label>
                            <label class="flex justify-between items-center text-xs tracking-wider">AIM LOCK TARGET <input type="checkbox" class="w-5 h-5 accent-cyan-400"></label>
                        </div>
                        <div class="pt-4 border-t border-cyan-900">
                            <p class="text-[9px] text-gray-500 mb-4 uppercase font-bold tracking-widest">Select Target Node</p>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="logAction('Target Node: HEAD')" class="bg-cyan-950 border border-cyan-700 p-2 text-[10px] rounded hover:bg-cyan-600 transition uppercase font-bold">Head</button>
                                <button onclick="logAction('Target Node: NECK')" class="bg-cyan-950 border border-cyan-700 p-2 text-[10px] rounded hover:bg-cyan-600 transition uppercase font-bold">Neck</button>
                                <button onclick="logAction('Target Node: BODY')" class="bg-cyan-950 border border-cyan-700 p-2 text-[10px] rounded hover:bg-cyan-600 transition uppercase font-bold">Body</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-ghost" class="tab-content hidden">
                    <h2 class="text-purple-400 text-sm font-black mb-6 uppercase border-b border-purple-900 pb-2 italic">Ghost Module</h2>
                    <div class="space-y-4 text-xs">
                        <label class="flex justify-between items-center">GHOST MODE <input type="checkbox" class="w-5 h-5 accent-purple-400"></label>
                        <label class="flex justify-between items-center">TELEPORT CAR <input type="checkbox" class="w-5 h-5 accent-purple-400"></label>
                        <label class="flex justify-between items-center">INVISIBLE PLAYER <input type="checkbox" class="w-5 h-5 accent-purple-400"></label>
                    </div>
                </div>

                <div id="tab-visual" class="tab-content hidden">
                    <h2 class="text-green-400 text-sm font-black mb-6 uppercase border-b border-green-900 pb-2 italic">Visual Module</h2>
                    <div class="space-y-4 text-xs">
                        <label class="flex justify-between items-center">ESP LINE <input type="checkbox" class="w-5 h-5 accent-green-400"></label>
                        <label class="flex justify-between items-center">ESP DISTANCE <input type="checkbox" class="w-5 h-5 accent-green-400"></label>
                    </div>
                </div>

                <div id="tab-weapon" class="tab-content hidden">
                    <h2 class="text-pink-400 text-sm font-black mb-6 uppercase border-b border-pink-900 pb-2 italic">Weapon Module</h2>
                    <div class="space-y-4 text-xs">
                        <label class="flex justify-between items-center">FAST RELOAD <input type="checkbox" class="w-5 h-5 accent-pink-400"></label>
                        <label class="flex justify-between items-center">NO RECOIL <input type="checkbox" class="w-5 h-5 accent-pink-400"></label>
                    </div>
                </div>
            </section>

            <aside class="w-full md:w-64 flex flex-col gap-4">
                <div class="flex-1 neon-box rounded-3xl flex items-center justify-center p-4 relative overflow-hidden">
                    <div class="absolute inset-0 bg-cyan-900/10 animate-pulse"></div>
                    <img src="https://i.ibb.co/L5hYf1S/image.png" class="character-img max-h-full object-contain z-10" alt="Character">
                </div>
                <div class="neon-box p-4 rounded-2xl h-32 overflow-y-auto font-mono text-[9px] text-cyan-400" id="logs">
                    > System Booted...
                    <br>> Waiting for Key...
                </div>
            </aside>
        </div>

        <button onclick="execute()" class="mt-4 py-4 bg-gradient-to-r from-cyan-600 to-blue-800 rounded-2xl font-black text-lg tracking-widest hover:scale-[1.01] transition-all active:scale-95 shadow-[0_0_30px_rgba(0,255,255,0.3)]">
            ACTIVATE EXPLOIT
        </button>
    </div>

    <script>
        function checkLogin() {
            const val = document.getElementById('pass').value.toUpperCase();
            if(val === "RIZAM") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                logAction("Access Granted. Welcome.");
            } else {
                alert("ACCESS DENIED: INVALID LICENSE KEY");
            }
        }

        function openTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            event.currentTarget.classList.add('active');
            logAction("Switched to " + tabName.toUpperCase());
        }

        function logAction(msg) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] ${msg}`;
            logs.scrollTop = logs.scrollHeight;
        }

        function execute() {
            logAction("Initializing injection...");
            setTimeout(() => logAction("Bypassing memory guard..."), 1000);
            setTimeout(() => {
                logAction("INJECTION SUCCESSFUL!");
                alert("Modules have been applied to the game process.");
            }, 2500);
        }
    </script>
</body>
</html>
